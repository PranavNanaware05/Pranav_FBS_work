<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* 🌄 Background */
        .bg{
            position: fixed;
            width: 100%;
            height: 100%;
            background: url("https://images.unsplash.com/photo-1498050108023-c5249f4df085");
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: zoom 10s infinite alternate;
        }

        @keyframes zoom{
            from{ transform: scale(1); }
            to{ transform: scale(1.1); }
        }

        /* 📦 Box */
        .box{
            width: 320px;
            padding: 25px;
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .box h2{
            margin-bottom: 15px;
        }

        /* 🖼 Icon */
        .logo{
            width: 70px;
            margin-bottom: 10px;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float{
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-10px); }
        }

        form{
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group{
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .input-group label{
            margin-bottom: 5px;
            font-size: 14px;
        }

        .input-group input{
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        /* 🔘 Register button */
        .btn{
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover{
            background: #007bff;
        }

        /* 🔗 Login link button */
        .login-link{
            display: block;
            width: 100%;
            padding: 10px;
            text-align: center;
            border: 1px solid #007bff;
            color: #007bff;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 10px;
        }

        .login-link:hover{
            background: #007bff;
            color: white;
        }

    </style>
</head>

<body>

    <!-- Background -->
    <div class="bg"></div>

    <div class="box">
        <h2>Register</h2>

        <!-- Icon -->
        <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png" class="logo">

        <form>
            <div class="input-group">
                <label>Username</label>
                <input type="text" placeholder="Enter username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Enter email" required>
            </div>

            <div class="input-group">
                <label>Phone</label>
                <input type="tel" placeholder="Enter phone number" required>
            </div>

            <!-- ✅ Correct submit button -->
            <button type="submit" class="btn">Register</button>
        </form>

        <!-- ✅ Correct navigation link -->
        <a href="login.html" class="login-link">Already have account? Login</a>
    </div>

</body>
</html>
