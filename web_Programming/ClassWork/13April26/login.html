<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Login</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* 🌄 Background Image with Animation */
        .bg{
            position: fixed;
            width: 100%;
            height: 100%;
            background: url("https://images.unsplash.com/photo-1503264116251-35a269479413");
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: zoom 10s infinite alternate;
        }

        @keyframes zoom{
            from{
                transform: scale(1);
            }
            to{
                transform: scale(1.1);
            }
        }

        /* 📦 Login Box */
        .box {
            width: 320px;
            padding: 30px;
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .box h2 {
            margin-bottom: 15px;
        }

        /* 🖼 Logo */
        .logo{
            width: 70px;
            margin-bottom: 10px;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float{
            0%,100%{
                transform: translateY(0);
            }
            50%{
                transform: translateY(-10px);
            }
        }

        .input-box {
            margin: 15px 0;
        }

        .input-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        /* 🔘 Login Button */
        .btn {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: #007bff;
        }

        form {
            margin-bottom: 10px;
        }

        /* 🔗 Register Button */
        .register {
            display: block;
            width: 100%;
            padding: 10px;
            background: transparent;
            color: #007bff;
            border: 1px solid #007bff;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 10px;
        }

        .register:hover {
            background: #007bff;
            color: white;
        }

    </style>
</head>

<body>

    <!-- Background -->
    <div class="bg"></div>

    <!-- Login Box -->
    <div class="box">
        <h2>Login</h2>

        <!-- Logo Image from Internet -->
        <img src="https://cdn-icons-png.flaticon.com/512/5087/5087579.png" class="logo">

        <form>
            <div class="input-box">
                <input type="text" placeholder="Username" required>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>

            <button class="btn">Login</button>
        </form>

        <a href="register.html" class="register">
            Don't have an account? Register
        </a>
    </div>

</body>
</html>
